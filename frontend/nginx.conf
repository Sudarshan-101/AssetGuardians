server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow uploads up to 510MB (backend limit is 500MB)
    client_max_body_size 510m;

    # Increase timeouts for large file uploads and slow connections
    proxy_read_timeout    300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;

    # Serve React SPA — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the FastAPI backend
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large uploads through the proxy
        client_max_body_size 510m;
        proxy_request_buffering off;
    }

    # Gzip compression for static assets
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
}
